name: Publish FETCH deployment release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v2027.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate FETCH deployment source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $versions = @("2025", "2026", "2027")

          foreach ($version in $versions) {
            $versionRoot = Join-Path $PWD $version
            $packagesRoot = Join-Path $versionRoot "Packages"
            $graphsRoot = Join-Path $versionRoot "Dynamo Graphs"

            foreach ($requiredPath in @($versionRoot, $packagesRoot, $graphsRoot)) {
              if (-not (Test-Path -LiteralPath $requiredPath)) {
                throw "Missing required FETCH folder: $requiredPath"
              }
            }

            $packageFolders = Get-ChildItem -LiteralPath $packagesRoot -Directory
            if ($packageFolders.Count -eq 0) {
              throw "No package folders found under $version/Packages"
            }

            foreach ($packageFolder in $packageFolders) {
              $manifestPath = Join-Path $packageFolder.FullName "pkg.json"
              if (-not (Test-Path -LiteralPath $manifestPath)) {
                throw "Package folder is missing pkg.json: $($packageFolder.Name)"
              }
            }

            $graphFiles = Get-ChildItem -LiteralPath $graphsRoot -Filter *.dyn -Recurse -File
            if ($graphFiles.Count -eq 0) {
              throw "No Dynamo graphs found under $version/Dynamo Graphs"
            }

            Write-Host "FETCH deployment source validation passed for ${version}: $($packageFolders.Count) packages, $($graphFiles.Count) graphs."
          }

      - name: Build FETCH deployment zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "2025", "2026", "2027" -DestinationPath "dist/fetch-sample-dynamo-deployment.zip" -Force
          Write-Host "Created dist/fetch-sample-dynamo-deployment.zip"

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: FETCH Sample Dynamo Deployment ${{ steps.release_tag.outputs.tag }}
          body: |
            Sample FETCH deployment zip for Dynamo packages and graphs.

            Use one of these URLs in FETCH:
            - Release page: https://github.com/johnpierson/FETCH-Sample-Dynamo-Deployment/releases/tag/${{ steps.release_tag.outputs.tag }}
            - Direct zip asset: https://github.com/johnpierson/FETCH-Sample-Dynamo-Deployment/releases/download/${{ steps.release_tag.outputs.tag }}/fetch-sample-dynamo-deployment.zip
          files: dist/fetch-sample-dynamo-deployment.zip

